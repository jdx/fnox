# Age encryption with 2FA (TOTP or YubiKey) - cryptographically enforced second factor
display_name = "Age + 2FA"
serde_rename = "age-2fa"
rust_variant = "Age2fa"
module = "age_2fa"
struct_name = "Age2faProvider"
category = "Local"
description = "Age encryption with TOTP or YubiKey second factor"
default_name = "age-2fa"
setup_instructions = """
Age 2FA uses age encryption with a second factor (TOTP or YubiKey).
The age private key is encrypted with a passphrase derived from the 2FA device,
so decryption is impossible without the second factor.
Run: fnox provider add --type age-2fa"""

[fields.recipients]
type = "vec_string"
wizard = false

[fields.auth]
type = "required"
placeholder = "totp"
label = "Auth method (totp or yubikey):"
wizard = true
